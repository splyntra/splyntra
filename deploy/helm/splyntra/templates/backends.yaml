            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "splyntra.fullname" . }}-valkey
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "splyntra.fullname" . }}-valkey
  labels: {{- include "splyntra.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.valkey.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "splyntra.fullname" . }}-valkey
  labels: {{- include "splyntra.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: valkey
  ports:
    - { port: 6379, targetPort: 6379 }
{{- end }}
