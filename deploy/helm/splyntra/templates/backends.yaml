{{- if .Values.nats.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splyntra.fullname" . }}-nats
  labels:
    {{- include "splyntra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "splyntra.labels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          args: ["--jetstream", "--store_dir=/data"]
          ports:
            - { containerPort: 4222 }
            - { containerPort: 8222 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "splyntra.fullname" . }}-nats
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "splyntra.fullname" . }}-nats
  labels: {{- include "splyntra.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.nats.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "splyntra.fullname" . }}-nats
  labels: {{- include "splyntra.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
{{- end }}
{{- if .Values.valkey.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splyntra.fullname" . }}-valkey
  labels:
    {{- include "splyntra.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        {{- include "splyntra.labels" . | nindent 8 }}
        app.kubernetes.io/component: valkey
    spec:
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}
