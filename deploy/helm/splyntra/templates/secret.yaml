apiVersion: v1
kind: Secret
metadata:
  name: {{ include "splyntra.secretName" . }}
  labels:
    {{- include "splyntra.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
  CLICKHOUSE_USER: {{ .Values.secrets.clickhouseUser | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | quote }}
  CLICKHOUSE_DB: {{ .Values.secrets.clickhouseDb | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  POSTGRES_DSN: {{ include "splyntra.postgresDsn" . | quote }}
  CLICKHOUSE_DSN: {{ include "splyntra.clickhouseDsn" . | quote }}
  NATS_URL: {{ include "splyntra.natsUrl" . | quote }}
  VALKEY_ADDR: {{ include "splyntra.valkeyAddr" . | quote }}
  ALERT_WEBHOOK_URL: {{ .Values.secrets.alertWebhookUrl | quote }}
  ALERT_SLACK_WEBHOOK_URL: {{ .Values.secrets.alertSlackWebhookUrl | quote }}
  S3_ENDPOINT: {{ printf "http://%s:9000" (include "splyntra.minioHost" .) | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.minioUser | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.minioPassword | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.minioUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioPassword | quote }}
  EVAL_BUCKET: "splyntra-datasets"
  EVAL_LLM_API_KEY: {{ .Values.secrets.evalLlmApiKey | quote }}
  EVAL_LLM_MODEL: "gpt-4o-mini"
  ENV: {{ .Values.env | quote }}
