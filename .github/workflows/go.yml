name: Go

on:
  push:
    branches: [main]
    paths:
      - "apps/collector/**"
      - "schema/**"
      - ".github/workflows/go.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/collector/**"
      - "schema/**"
      - ".github/workflows/go.yml"

concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/collector

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/collector/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: apps/collector/coverage.out

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/collector

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/collector/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: apps/collector
          version: v1.57
