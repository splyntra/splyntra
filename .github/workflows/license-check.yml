name: license-check

on:
  push:
    paths:
      - "apps/**"
      - "sdks/**"
      - "examples/**"
      - "tests/**"
      - "scripts/license_headers.py"
      - ".github/workflows/license-check.yml"
  pull_request:

jobs:
  spdx-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify SPDX headers (AGPL-3.0 server/dashboard/detectors, Apache-2.0 SDKs)
        run: python scripts/license_headers.py --check
