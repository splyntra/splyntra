name: Python

on:
  push:
    branches: [main]
    paths:
      - "sdks/python/**"
      - "apps/security/**"
      - "apps/evaluation/**"
      - ".github/workflows/python.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/python/**"
      - "apps/security/**"
      - "apps/evaluation/**"
      - ".github/workflows/python.yml"

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: sdks/python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: |
          pip install mypy
          mypy src/splyntra --ignore-missing-imports || true

      - name: Import test
        run: python -c "from splyntra import Splyntra, trace_agent, trace_tool, trace_llm, instrument; print('OK')"

      - name: Test
        run: pytest --tb=short

  security-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/security

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test detectors
        run: |
          python -c "from detectors.secrets import SecretDetector; print('Secrets: OK')"
          python -c "from detectors.injection import InjectionDetector; print('Injection: OK')"

      - name: Pytest
        run: pytest --tb=short

  evaluation-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/evaluation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Pytest
        run: pytest --tb=short
